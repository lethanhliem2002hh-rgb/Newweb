<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không Gian Sáng Tạo</title>
    <style>
        /* Phần CSS để trang trí web */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f4f1ea; /* Màu nền hơi ngà, phong cách retro */
            color: #333;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            line-height: 1.8;
            color: #555;
        }
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background-color: #d35400; /* Màu cam đất */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
            cursor: pointer;
            border: none;
        }
        .btn:hover {
            background-color: #e67e22;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">📷</div>
        <h1>Xin chào!</h1>
        <p>Chào mừng bạn đến với góc nhỏ của tôi trên Internet. Tôi yêu thích việc kết hợp giữa những dòng code logic và nghệ thuật thị giác.</p>
        <p>Trang web này sẽ là nơi tôi trưng bày các dự án thiết kế, những bức ảnh tâm đắc và các công cụ web thú vị.</p>
        
        <button class="btn" onclick="hienThiLoiChao()">Chạm vào đây</button>
    </div>

    <script>
        /* Phần JavaScript để tạo tương tác */
        function hienThiLoiChao() {
            alert("Cảm ơn bạn đã ghé thăm! Trang web đang được hoàn thiện thêm.");
        }
    </script>

</body>
</html>
